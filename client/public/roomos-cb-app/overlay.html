.slide {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  background: #000;
  padding-bottom: 42px;
  will-change: opacity;
}

  justify-content: center;
}

.slide.active {
  opacity: 1;
  pointer-events: auto;
}

  animation: cutIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.slide.exiting {
  animation: cutOut 0.3s cubic-bezier(0.4, 0, 1, 1) forwards;
}

  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes cutOut {

.dash-mini-fill { height: 100%; background: linear-gradient(90deg, #6366F1, #F87171); border-radius: 2px; width: 0%; transition: width 2.2s cubic-bezier(0.16, 1, 0.3, 1); }

.anim-up { opacity: 0; transform: translateY(20px); }
.anim-scale { opacity: 0; transform: scale(0.94); }

.slide.active .anim-up { animation: riseUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.slide.active .anim-up.d1 { animation-delay: 0.12s; }
.slide.active .anim-up.d2 { animation-delay: 0.24s; }
.slide.active .anim-up.d3 { animation-delay: 0.36s; }
.slide.active .anim-up.d4 { animation-delay: 0.48s; }
.slide.active .anim-scale { animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
.slide.active .anim-scale.d1 { animation-delay: 0.15s; }

@keyframes riseUp {
  to { transform: translateY(0); opacity: 1; }
}

@keyframes popIn {
  to { transform: scale(1); opacity: 1; }
}
</style>
