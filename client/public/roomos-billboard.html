<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RoomOS Billboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  background: #000;
  color: #ffffff;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.billboard {
  width: 100vw;
  height: 100vh;
  position: relative;
}

.slide {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  background: #000;
  padding-bottom: 42px;
  will-change: opacity;
}

.slide-inner {
  transform: scale(0.88);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.slide.active {
  opacity: 1;
  pointer-events: auto;
}

.slide.entering {
  animation: cutIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}

.slide.exiting {
  animation: cutOut 0.3s cubic-bezier(0.4, 0, 1, 1) forwards;
}

@keyframes cutIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes cutOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

.hud {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 50;
}

.hud-tl {
  position: absolute;
  top: 24px;
  left: 28px;
  display: flex;
  align-items: center;
  gap: 10px;
  opacity: 0.85;
}

.hud-tl svg {
  width: 16px;
  height: 16px;
  stroke: #aaa;
  stroke-width: 2;
  fill: none;
}

.hud-tl-text {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 3px;
  color: #aaa;
}

.hud-tl-text .hud-os { color: #F87171; opacity: 1; }

.hud-tr {
  position: absolute;
  top: 24px;
  right: 28px;
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0.85;
}

.hud-status {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #aaa;
  text-transform: uppercase;
}

.hud-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #F87171;
  animation: hudBlink 1.6s ease-in-out infinite;
  box-shadow: 0 0 8px rgba(248, 113, 113, 0.5);
}

@keyframes hudBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

.hud-clock {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  color: #aaa;
  font-variant-numeric: tabular-nums;
}

.hud-bl {
  position: absolute;
  bottom: 54px;
  left: 28px;
  opacity: 0.8;
}

.hud-bl-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  color: #888;
  text-transform: uppercase;
  margin-bottom: 3px;
}

.hud-bl-time {
  font-size: 14px;
  font-weight: 700;
  color: #aaa;
  font-variant-numeric: tabular-nums;
  letter-spacing: 1px;
}

.ticker {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 42px;
  background: #080808;
  border-top: 1px solid #151515;
  display: flex;
  align-items: center;
  overflow: hidden;
  z-index: 100;
}

.ticker-content {
  display: flex;
  align-items: center;
  white-space: nowrap;
  animation: tickerScroll 50s linear infinite;
  gap: 56px;
}

@keyframes tickerScroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.ticker-item {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: #999;
}

.ticker-item .brand {
  color: #F87171;
  font-weight: 800;
}

.ticker-item .accent {
  color: #6366F1;
  font-weight: 700;
}

.ticker-sep {
  color: #333;
  font-size: 10px;
  font-weight: 300;
  flex-shrink: 0;
}

.hook-text {
  font-size: 78px;
  font-weight: 900;
  letter-spacing: -3px;
  line-height: 1.02;
  text-align: center;
  max-width: 920px;
  animation: breathe 4s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { opacity: 0.65; }
  50% { opacity: 1; }
}

.hook-text .red { color: #F87171; }

.hook-text .indigo { color: #6366F1; }

.hook-sub {

  font-size: 13px;
  font-weight: 600;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #999;

}

.logo-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 24px;
}

.logo-icon {
  width: 160px;
  height: 160px;
  background: #080808;
  border-radius: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid #1a1a1a;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 0 40px rgba(248, 113, 113, 0.1),
    0 0 80px rgba(99, 102, 241, 0.06);
}

.logo-icon svg {
  width: 76px;
  height: 76px;
  filter: drop-shadow(0 0 10px rgba(255,255,255,0.25));
  position: relative;
  z-index: 2;
}

.logo-sweep {
  position: absolute;
  top: 0; left: -100%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
  z-index: 1;
  animation: sweep 5s ease-in-out 1s infinite;
}

@keyframes sweep {
  0% { left: -50%; }
  40% { left: 120%; }
  100% { left: 120%; }
}

.logo-glow-red {
  position: absolute;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(248, 113, 113, 0.1) 0%, transparent 60%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 0;
  animation: pulseRed 4s ease-in-out infinite;
}

.logo-glow-indigo {
  position: absolute;
  width: 260px;
  height: 260px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(99, 102, 241, 0.07) 0%, transparent 55%);
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 0;
  animation: pulseIndigo 4s ease-in-out 2s infinite;
}

@keyframes pulseRed {
  0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.08); }
}

@keyframes pulseIndigo {
  0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(1); }
  50% { opacity: 0.85; transform: translate(-50%, -50%) scale(1.1); }
}

.logo-title {

.feature-label {

.feature-headline {

.session-label {

.whale-hero-label {

function countUp(el, target, prefix, duration) {
  const start = performance.now();
  const fmt = (v) => prefix + v.toLocaleString();
  el.textContent = fmt(0);
  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = fmt(Math.round(target * eased));
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function startHUD() {
  const clockEl = document.getElementById('hud-clock');
  const uptimeEl = document.getElementById('hud-uptime');
  const startTime = Date.now();

  function pad(n) { return String(n).padStart(2, '0'); }

  setInterval(() => {
    const now = new Date();
    clockEl.textContent = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());

    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60);
    const s = elapsed % 60;
    uptimeEl.textContent = pad(m) + ':' + pad(s);
  }, 1000);
}

function generateHeatmapSegments() {
  const intensities = [0.15, 0.2, 0.3, 0.35, 0.25, 0.4, 0.55, 0.7, 0.85, 1.0, 0.95, 0.8, 0.6, 0.45, 0.35, 0.5, 0.65, 0.75, 0.6, 0.4, 0.3, 0.2, 0.15, 0.1];
  return intensities.map(v => {
    const r = Math.round(248 * v);
    const g = Math.round(113 * v * 0.3);
    const b = Math.round(113 * v * 0.3);
    const h = Math.round(v * 32);
    return `<div class="heatmap-segment" style="height:${h}px;background:rgba(${r},${g},${b},${Math.max(v, 0.2)})"></div>`;
  }).join('');
}
