            sessionStorage.setItem('chunk-reload', '1');

          } else {
            sessionStorage.removeItem('chunk-reload');
          }
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason && (e.reason.message || String(e.reason));

          }
        }
      });
